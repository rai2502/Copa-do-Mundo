  <title>Publicar Item - Mercado da Copa</title>

  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;700&family=JetBrains+Mono:wght@600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      vertical-align: middle;
    }
    .neobrutalist-push:active {
      transform: translate(2px, 2px);
      box-shadow: 0 0 0 transparent !important;
    }
    .neobrutalist-shadow {
      box-shadow: 4px 4px 0px #000;
    }
    body {
      min-height: max(884px, 100dvh);
      font-family: 'Hanken Grotesk', sans-serif;
    }
    .toast-message {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #003215;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      z-index: 1001;
      animation: fadeInOut 3s ease-in-out;
      box-shadow: 4px 4px 0px 0px #fcd400;
      border: 1px solid #fcd400;
      white-space: nowrap;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0); }
      85% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    }
    /* Preview da imagem */
    .image-preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }
    .preview-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e1e3e4;
      border-radius: 8px;
      overflow: hidden;
    }
  </style>

<body class="bg-background text-on-surface font-body-lg min-h-screen pb-32">

  <!-- TopAppBar -->
  <header class="w-full top-0 sticky z-50 bg-surface border-b-2 border-outline-variant flex justify-between items-center px-container-margin py-stack-sm">
    <div class="flex items-center gap-4">
      <button onclick="window.location.href='telaprincipal.html'" class="text-primary hover:opacity-80 transition-opacity">

      <h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">Mercado da Copa</h1>
    </div>
    <div class="flex items-center gap-4">
      <button class="text-primary hover:opacity-80 transition-opacity">
        <span class="material-symbols-outlined">help</span>
      </button>
    </div>
  </header>

  <main class="max-w-[1200px] mx-auto px-container-margin pt-stack-md">
    <!-- Section: Anunciar Novo Item -->
    <section class="mb-stack-lg">
      <div class="flex items-baseline justify-between mb-stack-sm">
        <h2 class="font-headline-lg-mobile text-headline-lg-mobile uppercase tracking-tight">Anunciar Novo Item</h2>
        <span class="font-label-caps text-label-caps text-primary bg-primary-fixed px-2 py-1 rounded">VENDEDOR PRO</span>
      </div>
      
      <div class="bg-surface-container border-2 border-outline-variant p-gutter rounded-lg">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-gutter">
          
          <!-- Photo Upload Placeholder com Preview -->
          <div class="md:col-span-4">
            <div id="uploadArea" class="aspect-square border-2 border-dashed border-outline flex flex-col items-center justify-center bg-surface-container-low hover:bg-surface-container-high transition-colors cursor-pointer group rounded-lg overflow-hidden">
              <div id="previewContainer" class="preview-container hidden">
                <img id="imagePreview" class="image-preview" alt="Preview">
              </div>
              <div id="uploadPlaceholder" class="flex flex-col items-center justify-center w-full h-full">
                <span class="material-symbols-outlined text-4xl text-outline mb-2 group-hover:scale-110 transition-transform">add_a_photo</span>
                <p class="font-label-caps text-label-caps text-on-surface-variant">SUBIR FOTO DO ITEM</p>
                <p class="font-body-sm text-body-sm text-outline-variant mt-1 text-center px-4">JPEG ou PNG (Máx 5MB)</p>
              </div>
              <input type="file" id="imageInput" accept="image/jpeg,image/png" class="hidden">
            </div>
          </div>
          
          <!-- Item Details Form -->
          <div class="md:col-span-8 flex flex-col gap-stack-sm">
            <div class="group">
              <label class="font-label-caps text-label-caps text-outline block mb-1">TÍTULO DO PRODUTO *</label>
              <input id="produtoTitulo" class="w-full bg-transparent border-b-2 border-outline focus:border-primary focus:ring-0 px-0 py-2 font-title-md text-title-md transition-colors placeholder:text-surface-variant" placeholder="Ex: Camisa Brasil 1994 Original" type="text"/>
            </div>
            
            <div class="grid grid-cols-2 gap-gutter">
              <div>
                <label class="font-label-caps text-label-caps text-outline block mb-1">PREÇO (R$) *</label>
                <input id="produtoPreco" class="w-full bg-transparent border-b-2 border-outline focus:border-primary focus:ring-0 px-0 py-2 font-title-md text-title-md transition-colors" placeholder="0,00" type="number" step="0.01"/>
              </div>
              <div>
                <label class="font-label-caps text-label-caps text-outline block mb-1">CATEGORIA *</label>
                <select id="produtoCategoria" class="w-full bg-transparent border-b-2 border-outline focus:border-primary focus:ring-0 px-0 py-2 font-body-lg text-body-lg transition-colors appearance-none">
                  <option value="camisas">Camisas Históricas</option>
                  <option value="bones">Bonés</option>
                  <option value="casacos">Casacos e Jaquetas</option>
                  <option value="chuteiras">Chuteiras</option>
                  <option value="bolas">Bolas</option>
                  <option value="acessorios">Acessórios e Colecionáveis</option>
                </select>
              </div>
            </div>
            
            <div class="grid grid-cols-2 gap-gutter">
              <div>
                <label class="font-label-caps text-label-caps text-outline block mb-1">TAMANHO</label>
                <input id="produtoTamanho" class="w-full bg-transparent border-b-2 border-outline focus:border-primary focus:ring-0 px-0 py-2 font-body-lg transition-colors" placeholder="Ex: G, M, PP, 42, Único" type="text"/>
              </div>
              <div>
                <label class="font-label-caps text-label-caps text-outline block mb-1">CONDIÇÃO</label>
                <select id="produtoCondicao" class="w-full bg-transparent border-b-2 border-outline focus:border-primary focus:ring-0 px-0 py-2 font-body-lg text-body-lg transition-colors">
                  <option value="Novo">Novo com etiqueta</option>
                  <option value="Excelente">Excelente (sem defeitos)</option>
                  <option value="Muito Bom">Muito Bom (leves sinais)</option>
                  <option value="Bom">Bom (sinais de uso)</option>
                  <option value="Vintage">Vintage (preservado)</option>
                </select>
              </div>
            </div>
            
            <div>
              <label class="font-label-caps text-label-caps text-outline block mb-1">DESCRIÇÃO DO ITEM</label>
              <textarea id="produtoDescricao" rows="3" class="w-full bg-transparent border-2 border-outline-variant rounded-lg p-2 focus:border-primary focus:ring-0 transition-colors" placeholder="Descreva o item, ano, história, detalhes importantes para o colecionador..."></textarea>
            </div>
            
            <div class="flex items-center gap-4 mt-2">
              <label class="flex items-center gap-2 cursor-pointer">
                <input id="aceitaTroca" type="checkbox" class="w-5 h-5 accent-primary">
                <span class="font-body-sm">Aceito troca por outros itens</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input id="entregaImediata" type="checkbox" class="w-5 h-5 accent-primary" checked>
                <span class="font-body-sm">Envio imediato (24h)</span>
              </label>
            </div>
            
            <button id="publicarBtn" class="mt-4 bg-primary text-on-primary font-headline-lg-mobile text-headline-lg-mobile py-4 rounded-lg flex items-center justify-center gap-2 hover:border-b-2 hover:border-secondary transition-all active:translate-y-0.5 neobrutalist-push">
              <span class="material-symbols-outlined">rocket_launch</span>
              PUBLICAR ITEM
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Section: Meus Itens (Itens Publicados pelo Usuário) -->
    <section>
      <div class="flex items-center justify-between mb-stack-sm border-b-2 border-primary-container pb-2">
        <h2 class="font-headline-lg-mobile text-headline-lg-mobile uppercase tracking-tight">Meus Itens</h2>
        <div class="flex gap-2">
          <button id="filterTodosBtn" class="bg-primary text-on-primary px-3 py-1 rounded border-2 border-primary font-label-caps text-label-caps">TODOS</button>
          <button id="filterAtivosBtn" class="text-on-surface-variant px-3 py-1 border-2 border-outline-variant rounded font-label-caps text-label-caps hover:bg-surface-container-high transition-colors">ATIVOS</button>
          <button id="filterVendidosBtn" class="text-on-surface-variant px-3 py-1 border-2 border-outline-variant rounded font-label-caps text-label-caps hover:bg-surface-container-high transition-colors">VENDIDOS</button>
        </div>
      </div>
      
      <!-- Items List -->
      <div id="meusItensList" class="space-y-4">
        <!-- Os itens serão injetados via JavaScript -->
      </div>
      
      <!-- Mensagem quando não há itens -->
      <div id="noItemsMessage" class="hidden flex flex-col items-center justify-center py-10 text-center">
        <span class="material-symbols-outlined text-surface-variant text-6xl mb-4">inventory</span>
        <h3 class="font-headline-lg-mobile text-primary">Nenhum item publicado</h3>
        <p class="text-on-surface-variant mt-2">Comece anunciando sua primeira relíquia!</p>
      </div>
    </section>
  </main>

  <!-- BottomNavBar -->
  <nav class="fixed bottom-0 w-full z-50 bg-surface border-t-2 border-outline-variant flex justify-around items-center px-2 py-3">
    <a href="telaprincipal.html" class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-high transition-all duration-100">
      <span class="material-symbols-outlined">home</span>
      <span class="font-label-caps text-label-caps mt-1">Home</span>
    </a>
    <a href="telaprincipal.html" class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-high transition-all duration-100">
      <span class="material-symbols-outlined">search</span>
      <span class="font-label-caps text-label-caps mt-1">Search</span>
    </a>
    <a href="publicaritens.html" class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl p-2 transition-all duration-100">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
      <span class="font-label-caps text-label-caps mt-1">Sell</span>
    </a>
    <a href="carrinho.html" class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-high transition-all duration-100">
      <span class="material-symbols-outlined">shopping_cart</span>
      <span class="font-label-caps text-label-caps mt-1">Cart</span>
    </a>
    <a href="perfil.html" class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-high transition-all duration-100">
      <span class="material-symbols-outlined">person</span>
      <span class="font-label-caps text-label-caps mt-1">Profile</span>
    </a>
  </nav>

  <script>
    // Chave para salvar os itens publicados
    const USER_ITEMS_KEY = 'mercado_copa_user_items';
    let currentImageData = null;
    let currentFilter = 'todos'; // todos, ativos, vendidos

    // Função para mostrar toast
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast-message';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Carregar itens do usuário do localStorage
    function loadUserItems() {
      const saved = localStorage.getItem(USER_ITEMS_KEY);
      if (saved) {
        return JSON.parse(saved);
      }
      // Itens de exemplo
      return [
        {
          id: 101,
          nome: "Camisa Brasil 1994 Original",
          preco: 890,
          categoria: "camisas",
          tamanho: "G",
          condicao: "Excelente",
          descricao: "Camisa original da Copa de 1994, nunca utilizada. Com patches e etiquetas.",
          aceitaTroca: true,

          dataPublicacao: new Date().toISOString()
        },
        {
          id: 102,
          nome: "Jaqueta Corta-Vento Retro 90s",
          preco: 450,
          categoria: "casacos",
          tamanho: "M",
          condicao: "Muito Bom",
          descricao: "Jaqueta vintage dos anos 90, estilo windbreaker. Cores azul marinho e branco.",
          aceitaTroca: false,
          entregaImediata: true,
          status: "vendido",
          imagem: "https://lh3.googleusercontent.com/aida-public/AB6AXuC62dQ5kP604-1pftSLJOhRtSspWov-O6EaxXz7gmVa-Xt3cFc3jXnITIocjVpoLRcUad84ghHUDUv434r0EeAeVADgGU-E8AEhxoQvX7Du8xvjMCmCBqFIQPTci0VG6xSMjd1fplQZiK0z27yV_AG59jfofLElbAyZXKEm6CftLA9taCbpMxAjZPLApOwnm4WqhvebjC65dDiyrCRSIifbv1XtEkbam1zNUi-I3cew-nxBzLQUfpy9z2dow1r79OCpkt0VTanPgF0",
          dataPublicacao: new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString(),
          dataVenda: new Date(Date.now() - 5 * 24 * 60 * 60 * 1000).toISOString()
        },
        {
          id: 103,
          nome: "Bola de Couro Réplica 1970",
          preco: 320,
          categoria: "bolas",
          tamanho: "Único",
          condicao: "Novo",
          descricao: "Réplica da bola oficial da Copa de 1970. Couro sintético de alta qualidade.",
          aceitaTroca: true,
          entregaImediata: false,
          status: "ativo",
          imagem: "https://lh3.googleusercontent.com/aida-public/AB6AXuCZzPNeJ-mxS0dWNKmFGArqUotDB1wRRxDgEZpf9-iS5Ml-7d42A4zQPI0xe0VWrOY47OzBdaC9S8GlYC3C2xtzNayC1pJ-B3XOu1Qu5DMrTFGzJluJIG4keRWtODMAzu9VFa4NXwFJxt99LC_HBWCeCfxJpKTGW1coiNmTU4jlxMdM034Jv-znAbC5Gwi3uv5SrteVEfpKB46jjMZaqeMGI1DxdqaKiMpvYptaAQoha0u1LjAJeTof2fxD9Vb7UzLS80DeBbJHg2Y",
          dataPublicacao: new Date(Date.now() - 15 * 24 * 60 * 60 * 1000).toISOString()
        }
      ];
    }

    // Salvar itens do usuário
    function saveUserItems(items) {
      localStorage.setItem(USER_ITEMS_KEY, JSON.stringify(items));
    }

    // Adicionar novo item
    function addNewItem(item) {
      const items = loadUserItems();
      items.unshift(item); // Adicionar no início
      saveUserItems(items);
      renderMyItems();
    }

    // Remover item
    function deleteItem(itemId) {
      const items = loadUserItems();
      const newItems = items.filter(item => item.id !== itemId);
      saveUserItems(newItems);
      renderMyItems();
      showToast('🗑️ Item removido com sucesso!');
    }

    // Marcar como vendido
    function markAsSold(itemId) {
      const items = loadUserItems();
      const item = items.find(i => i.id === itemId);
      if (item) {
        item.status = 'vendido';
        item.dataVenda = new Date().toISOString();
        saveUserItems(items);
        renderMyItems();
        showToast('🏆 Item marcado como vendido! Parabéns pela venda!');
      }
    }

    // Reativar item
    function reactivateItem(itemId) {
      const items = loadUserItems();
      const item = items.find(i => i.id === itemId);
      if (item) {
        item.status = 'ativo';
        delete item.dataVenda;
        saveUserItems(items);
        renderMyItems();
        showToast('🔄 Item reativado e disponível para venda!');
      }
    }

    // Renderizar meus itens
    function renderMyItems() {
      const items = loadUserItems();
      const container = document.getElementById('meusItensList');
      const noItemsMessage = document.getElementById('noItemsMessage');
      
      let filteredItems = items;
      if (currentFilter === 'ativos') {
        filteredItems = items.filter(item => item.status === 'ativo');
      } else if (currentFilter === 'vendidos') {
        filteredItems = items.filter(item => item.status === 'vendido');
      }
      
      if (filteredItems.length === 0) {
        container.innerHTML = '';
        container.classList.add('hidden');
        noItemsMessage.classList.remove('hidden');
        return;
      }
      
      container.classList.remove('hidden');
      noItemsMessage.classList.add('hidden');
      
      const categoriaNome = {
        'camisas': 'Camisas',
        'bones': 'Bonés',
        'casacos': 'Casacos',
        'chuteiras': 'Chuteiras',
        'bolas': 'Bolas',
        'acessorios': 'Acessórios'
      };
      
      container.innerHTML = filteredItems.map(item => `
        <div class="group relative bg-surface border-2 border-outline-variant p-4 flex gap-4 items-center transition-all hover:bg-surface-container-low ${item.status === 'vendido' ? 'opacity-70 grayscale-[0.5]' : ''}">
          <div class="w-20 h-20 bg-surface-container-highest flex-shrink-0 border border-outline-variant overflow-hidden rounded">
            <img src="${item.imagem}" class="w-full h-full object-cover" alt="${item.nome}" onerror="this.src='https://placehold.co/400x500/e0e0e0/333?text=Sem+Imagem'">
          </div>
          <div class="flex-grow">
            <div class="flex justify-between items-start">
              <div>
                <h3 class="font-title-md text-title-md leading-tight">${item.nome}</h3>
                <p class="font-label-caps text-label-caps text-outline">${categoriaNome[item.categoria] || item.categoria} • SKU: MDC-${item.id}</p>
              </div>
              <span class="${item.status === 'ativo' ? 'bg-primary-container text-on-primary-container' : 'bg-secondary text-on-secondary'} font-label-caps text-[10px] px-2 py-1 rounded-full flex items-center gap-1">
                <span class="material-symbols-outlined !text-[12px]">${item.status === 'ativo' ? 'check_circle' : 'shopping_bag'}</span>
                ${item.status === 'ativo' ? 'ATIVO' : 'VENDIDO'}
              </span>
            </div>
            <div class="flex items-center gap-4 mt-2">
              <span class="font-headline-lg text-headline-lg text-primary">R$ ${item.preco.toFixed(2).replace('.', ',')}</span>
              <span class="font-body-sm text-body-sm text-outline">Tamanho: ${item.tamanho}</span>
            </div>
          </div>
          <div class="flex gap-2">
            ${item.status === 'ativo' ? `
              <button onclick="markAsSold(${item.id})" class="p-2 border-2 border-outline-variant hover:bg-secondary-container hover:text-on-secondary-container hover:border-secondary-container transition-all rounded" title="Marcar como vendido">
                <span class="material-symbols-outlined">sell</span>
              </button>
              <button onclick="deleteItem(${item.id})" class="p-2 border-2 border-outline-variant hover:bg-error-container hover:text-on-error-container hover:border-error-container transition-all rounded" title="Excluir item">
                <span class="material-symbols-outlined">delete</span>
              </button>
            ` : `
              <button onclick="reactivateItem(${item.id})" class="p-2 border-2 border-outline-variant hover:bg-primary-container hover:text-on-primary-container hover:border-primary-container transition-all rounded" title="Reativar item">
                <span class="material-symbols-outlined">restart_alt</span>
              </button>
              <button onclick="deleteItem(${item.id})" class="p-2 border-2 border-outline-variant hover:bg-error-container hover:text-on-error-container hover:border-error-container transition-all rounded" title="Excluir item">
                <span class="material-symbols-outlined">delete</span>
              </button>
            `}
          </div>
        </div>
      `).join('');
    }

    // Upload de imagem
    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');
    const previewContainer = document.getElementById('previewContainer');
    const uploadPlaceholder = document.getElementById('uploadPlaceholder');
    const imagePreview = document.getElementById('imagePreview');

    uploadArea.addEventListener('click', () => {
      imageInput.click();
    });

    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file && (file.type === 'image/jpeg' || file.type === 'image/png')) {
        const reader = new FileReader();
        reader.onload = (event) => {
          currentImageData = event.target.result;
          imagePreview.src = currentImageData;
          previewContainer.classList.remove('hidden');
          uploadPlaceholder.classList.add('hidden');
        };
        reader.readAsDataURL(file);
      } else {
        showToast('⚠️ Por favor, selecione um arquivo JPG ou PNG válido.');
      }
    });

    // Publicar item
    function publicarItem() {
      const titulo = document.getElementById('produtoTitulo').value.trim();
      const preco = parseFloat(document.getElementById('produtoPreco').value);
      const categoria = document.getElementById('produtoCategoria').value;
      const tamanho = document.getElementById('produtoTamanho').value.trim() || 'Único';
      const condicao = document.getElementById('produtoCondicao').value;
      const descricao = document.getElementById('produtoDescricao').value.trim();
      const aceitaTroca = document.getElementById('aceitaTroca').checked;
      const entregaImediata = document.getElementById('entregaImediata').checked;
      
      // Validações
      if (!titulo) {
        showToast('⚠️ Por favor, preencha o título do produto.');
        return;
      }
      if (!preco || preco <= 0) {
        showToast('⚠️ Por favor, preencha um preço válido.');
        return;
      }
      if (!currentImageData) {
        showToast('⚠️ Por favor, adicione uma foto do item.');
        return;
      }
      
      // Criar novo item
      const novoItem = {
        id: Date.now(),
        nome: titulo,
        preco: preco,
        categoria: categoria,
        tamanho: tamanho,
        condicao: condicao,
        descricao: descricao || "Item em excelente estado de conservação. Peça original e autêntica.",
        aceitaTroca: aceitaTroca,
        entregaImediata: entregaImediata,
        status: 'ativo',
        imagem: currentImageData,
        dataPublicacao: new Date().toISOString()
      };
      
      addNewItem(novoItem);
      
      // Limpar formulário
      document.getElementById('produtoTitulo').value = '';
      document.getElementById('produtoPreco').value = '';
      document.getElementById('produtoTamanho').value = '';
      document.getElementById('produtoDescricao').value = '';
      document.getElementById('aceitaTroca').checked = false;
      document.getElementById('entregaImediata').checked = true;
      document.getElementById('produtoCategoria').value = 'camisas';
      document.getElementById('produtoCondicao').value = 'Excelente';
      
      // Limpar imagem
      currentImageData = null;
      previewContainer.classList.add('hidden');
      uploadPlaceholder.classList.remove('hidden');
      imagePreview.src = '';
      imageInput.value = '';
      
      showToast('✅ Item publicado com sucesso! Agora ele aparece na vitrine.');
      
      // Rolar para a seção de meus itens
      document.getElementById('meusItensList').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Event Listeners
    document.getElementById('publicarBtn').addEventListener('click', publicarItem);
    document.getElementById('filterTodosBtn').addEventListener('click', () => {
      currentFilter = 'todos';
      document.getElementById('filterTodosBtn').classList.add('bg-primary', 'text-on-primary');
      document.getElementById('filterTodosBtn').classList.remove('text-on-surface-variant', 'border-outline-variant');
      document.getElementById('filterAtivosBtn').classList.remove('bg-primary', 'text-on-primary');
      document.getElementById('filterAtivosBtn').classList.add('text-on-surface-variant', 'border-outline-variant');
      document.getElementById('filterVendidosBtn').classList.remove('bg-primary', 'text-on-primary');
      document.getElementById('filterVendidosBtn').classList.add('text-on-surface-variant', 'border-outline-variant');
      renderMyItems();
    });
    document.getElementById('filterAtivosBtn').addEventListener('click', () => {
      currentFilter = 'ativos';
      document.getElementById('filterAtivosBtn').classList.add('bg-primary', 'text-on-primary');
      document.getElementById('filterAtivosBtn').classList.remove('text-on-surface-variant', 'border-outline-variant');
      document.getElementById('filterTodosBtn').classList.remove('bg-primary', 'text-on-primary');
      document.getElementById('filterTodosBtn').classList.add('text-on-surface-variant', 'border-outline-variant');
      document.getElementById('filterVendidosBtn').classList.remove('bg-primary', 'text-on-primary');
      document.getElementById('filterVendidosBtn').classList.add('text-on-surface-variant', 'border-outline-variant');
      renderMyItems();
    });
    document.getElementById('filterVendidosBtn').addEventListener('click', () => {
      currentFilter = 'vendidos';
      document.getElementById('filterVendidosBtn').classList.add('bg-primary', 'text-on-primary');
      document.getElementById('filterVendidosBtn').classList.remove('text-on-surface-variant', 'border-outline-variant');
      document.getElementById('filterTodosBtn').classList.remove('bg-primary', 'text-on-primary');
      document.getElementById('filterTodosBtn').classList.add('text-on-surface-variant', 'border-outline-variant');
      document.getElementById('filterAtivosBtn').classList.remove('bg-primary', 'text-on-primary');
      document.getElementById('filterAtivosBtn').classList.add('text-on-surface-variant', 'border-outline-variant');
      renderMyItems();
    });
    
    // Inicializar
    document.addEventListener('DOMContentLoaded', () => {
      renderMyItems();
    });
    
    // Expor funções globalmente
    window.deleteItem = deleteItem;
    window.markAsSold = markAsSold;
    window.reactivateItem = reactivateItem;
  </script>
</body>
</html>
